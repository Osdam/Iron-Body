<div class="forgot-container">
  <div class="forgot-card">
    <!-- Header -->
    <div class="card-header">
      <a routerLink="/login" class="back-button" title="Volver al login">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path
            d="M19 12H5M12 19l-7-7 7-7"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
      <div class="logo-circle">
        <svg class="logo-icon" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"
          />
        </svg>
      </div>
      <h1 class="card-title">Recuperar contraseña</h1>
      <p class="card-subtitle">Ingresa tu correo para recibir instrucciones de recuperación.</p>
    </div>

    <!-- Form Content -->
    <div class="card-content">
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="forgot-form">
        <!-- Email Field -->
        <div class="form-group">
          <label for="email" class="form-label">Correo electrónico</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            <input
              id="email"
              type="email"
              formControlName="email"
              class="form-input"
              [class.is-invalid]="isFieldInvalid('email')"
              placeholder="admin@ironbody.com"
              autocomplete="email"
            />
          </div>
          @if (isFieldInvalid('email')) {
            <span class="error-text">{{ getFieldError('email') }}</span>
          }
        </div>

        <!-- Error Message -->
        @if (errorMessage()) {
          <div class="alert alert-error">
            {{ errorMessage() }}
          </div>
        }

        <!-- Success Message -->
        @if (successMessage()) {
          <div class="alert alert-success">
            {{ successMessage() }}
          </div>
        }

        <!-- Submit Button -->
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="isLoading() || forgotForm.invalid"
        >
          @if (isLoading()) {
            <span class="btn-loading">
              <span class="spinner"></span>
              Enviando...
            </span>
          } @else {
            Enviar instrucciones
          }
        </button>
      </form>

      <!-- Back to Login Link -->
      <div class="back-link-section">
        <p class="back-text">¿Recuerdas tu contraseña?</p>
        <a routerLink="/login" class="back-link">Volver al inicio de sesión</a>
      </div>
    </div>
  </div>

  <!-- Decorative Background -->
  <div class="background-decoration">
    <div class="decoration-circle circle-1"></div>
    <div class="decoration-circle circle-2"></div>
  </div>
</div>
